<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout GAMEFLIX | Finalize seu Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e50914;
            --primary-hover: #ff0a16;
            --bg-dark: #050505;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --text-gray: #888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            /* Background com um leve gradiente radial para profundidade */
            background-image: radial-gradient(circle at center, #1a0202 0%, #050505 100%);
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        /* Container com borda brilhante */
        .checkout-container {
            background: var(--card-bg);
            width: 95%;
            max-width: 950px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(229, 9, 20, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 10px rgba(229, 9, 20, 0.1);
            position: relative;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Barra de Progresso Superior */
        .step-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: rgba(20, 20, 20, 0.8);
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .step { color: #444; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .step.active { color: #fff; font-weight: bold; }
        .step span { 
            background: #222; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; font-size: 0.8rem; border: 1px solid #333;
        }
        .step.active span { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); }
        .step-line { width: 50px; height: 1px; background: #333; }

        .checkout-flex { display: flex; flex-wrap: wrap; }

        /* Lado Esquerdo */
        .product-sidebar {
            flex: 1;
            min-width: 320px;
            padding: 40px;
            background: linear-gradient(145deg, #0f0f0f 0%, #161616 100%);
            border-right: 1px solid #222;
        }

        .logo-gameflix {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            display: block;
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
        }
        .red { color: var(--primary); }

        .product-box {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .product-img {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .product-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; line-height: 1.2; }
        .product-info p { margin: 0; color: var(--text-gray); font-size: 0.85rem; }
        .badge {
            display: inline-block;
            margin-top: 12px;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .price-total {
            margin-top: 20px;
            padding: 20px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-total span { color: var(--text-gray); font-size: 0.9rem; }
        .price-total h2 { margin: 0; font-size: 2.2rem; color: #fff; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

        /* Lado Direito */
        .form-content {
            flex: 1.2;
            min-width: 320px;
            padding: 45px;
        }

        .form-header h3 { margin: 0 0 8px 0; font-size: 1.6rem; font-weight: 700; }
        .form-header p { margin: 0 0 35px 0; color: var(--text-gray); font-size: 0.95rem; }

        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block;
            color: #ddd;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.15);
            outline: none;
            background: #222;
        }

        .btn-finish {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .btn-finish:hover { 
            background: var(--primary-hover); 
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4);
        }
        /* Efeito de brilho passando pelo botão */
        .btn-finish::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(45deg);
            transition: 0.5s;
            pointer-events: none;
        }
        .btn-finish:hover::after { left: 120%; }

        .secure-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
            color: #555;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .checkout-container { border-radius: 0; width: 100%; margin: 0; }
            .checkout-flex { flex-direction: column; }
            .product-sidebar { order: 2; padding: 30px; border-right: none; border-top: 1px solid #222; }
            .form-content { order: 1; padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="step-bar">
            <div class="step active"><span>1</span> Dados</div>
            <div class="step-line"></div>
            <div class="step"><span>2</span> Pagamento</div>
        </div>

        <div class="checkout-flex">
            <div class="product-sidebar">
                <span class="logo-gameflix">GAME<span class="red">FLIX</span></span>
                
                <div class="product-box">
                    <img src="https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/aajbs93YvS7P6LrUisPCid9p.png" alt="Produto" class="product-img">
                    <div class="product-info">
                        <h3>Elden Ring: Shadow of the Erdtree</h3>
                        <p>Plano Premium Digital</p>
                        <span class="badge">● ENTREGA IMEDIATA</span>
                    </div>
                </div>

                <div class="price-total">
                    <span>Total a pagar</span>
                    <h2>R$ 29,90</h2>
                </div>
            </div>

            <div class="form-content">
                <div class="form-header">
                    <h3>Prepara o teu acesso</h3>
                    <p>Preenche os campos abaixo para desbloquear o seu jogo instantaneamente.</p>
                </div>

                <div class="input-group">
                    <label>NOME COMPLETO</label>
                    <input type="text" placeholder="Ex: Ian Ferreira">
                </div>

                <div class="input-group">
                    <label>E-MAIL PARA RECEBER O ACESSO</label>
                    <input type="email" placeholder="seu@email.com">
                </div>

                <div class="input-group">
                    <label>WHATSAPP (OPCIONAL)</label>
                    <input type="tel" placeholder="(00) 0 0000-0000">
                </div>

                <button class="btn-finish">DESBLOQUEAR ACESSO AGORA</button>

                <div class="secure-info">
                    <span>🛡️ COMPRA 100% SEGURA</span>
                    <span>⭐ SATISFAÇÃO GARANTIDA</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
