<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GAMEFLIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #e50914; --bg-dark: #0a0a0a; --card-bg: #141414; --input-bg: #1a1a1a; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); font-family: 'Roboto', sans-serif; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at center, #1a0202 0%, #050505 100%); }
        .urgency-timer { background: var(--netflix-red); width: 100%; text-align: center; padding: 8px 0; font-family: 'Bebas Neue'; font-size: 1.2rem; position: fixed; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(229, 9, 20, 0.4); }
        .checkout-container { background: var(--card-bg); width: 95%; max-width: 900px; border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-top: 50px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .step-bar { display: flex; align-items: center; justify-content: center; padding: 20px; background: #1a1a1a; gap: 15px; border-bottom: 1px solid #222; }
        .step { color: #555; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-family: 'Bebas Neue'; }
        .step.active { color: #fff; }
        .step span { background: #333; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .step.active span { background: var(--netflix-red); box-shadow: 0 0 10px var(--netflix-red); }
        .checkout-flex { display: flex; flex-wrap: wrap; }
        .product-sidebar { flex: 1; min-width: 320px; padding: 40px; background: #111; border-right: 1px solid #222; }
        .logo-gameflix { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: white; margin-bottom: 30px; display: block; }
        .logo-gameflix span { color: var(--netflix-red); }
        .product-box { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 25px; border-bottom: 1px solid #222; }
        .product-img { width: 80px; height: 110px; border-radius: 6px; object-fit: cover; }
        .form-content { flex: 1.2; min-width: 320px; padding: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #bbb; font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; }
        .input-group input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 1rem; }
        .netflix-btn { display: block; width: 100%; padding: 20px 0; font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #fff; background: linear-gradient(90deg, #e50914, #ff3b3b); border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px #e50914; }
        #pix-display { display: none; background: #fff; color: #000; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        #pix-qr { width: 180px; margin: 10px auto; display: block; }
        @media (max-width: 768px) { .checkout-flex { flex-direction: column; } .checkout-container { margin-top: 40px; } }
    </style>
</head>
<body>
    <div class="urgency-timer">OFERTA TERMINA EM: <span id="timer">09:59</span></div>
    <div class="checkout-container">
        <div class="step-bar">
            <div class="step active"><span>1</span> DADOS</div>
            <div id="step2-label" class="step"><span>2</span> PAGAMENTO</div>
        </div>
        <div class="checkout-flex">
            <div class="product-sidebar">
                <span class="logo-gameflix">GAME<span>FLIX</span></span>
                <div class="product-box">
                    <img src="https://res.cloudinary.com/dlt1gqwnc/image/upload/v1772039414/pngtree-gamer-girl-streaming-online-isolated-on-transparent-background-png-image_16583366_pbl4v8.png" class="product-img">
                    <div class="product-info">
                        <h3>PACOTE GAMEFLIX</h3>
                        <span style="color:#46d369; font-size:0.75rem; font-weight:bold">ENTREGA IMEDIATA</span>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#888;">Total:</span>
                    <h2 id="valor-pago" style="margin:0; font-family: 'Bebas Neue'; font-size: 2rem;">R$ 29,90</h2>
                </div>
            </div>
            <div class="form-content">
                <div id="data-step">
                    <h3 style="margin-top:0; font-family: 'Bebas Neue'; font-size: 1.8rem;">DADOS DE ACESSO</h3>
                    <div class="input-group"><label>E-MAIL</label><input type="email" id="customer-email" placeholder="seu@email.com"></div>
                    <div class="input-group"><label>WHATSAPP</label><input type="tel" id="customer-phone" placeholder="(53) 99999-9999"></div>
                    <button class="netflix-btn" onclick="nextStep()">PRÓXIMO PASSO</button>
                </div>
                <div id="payment-step" style="display:none">
                    <h3 style="margin-top:0; font-family: 'Bebas Neue'; font-size: 1.8rem;">PAGAMENTO PIX</h3>
                    <button id="btn-finalizar" class="netflix-btn" onclick="gerarPagamento()">FINALIZAR COMPRA</button>
                    <div id="pix-display">
                        <p style="font-weight:bold; color:#2ecc71">PIX GERADO COM SUCESSO!</p>
                        <img id="pix-qr" src="">
                        <textarea id="pix-copy" readonly style="width:100%; font-size:10px; height:40px; margin-top:10px"></textarea>
                        <button onclick="copyPix()" style="width:100%; padding:10px; background:#2ecc71; color:#fff; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:10px">COPIAR CÓDIGO PIX</button>
                    </div>
                    <p onclick="location.reload()" style="text-align:center; color:#666; font-size:0.8rem; margin-top:15px; cursor:pointer;">← Voltar e corrigir dados</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const URL_SUPABASE = "https://ybmsmvzwhsapznhgeomc.supabase.co/functions/v1/super-handler";

        // Captura valor da URL (ex: ?valor=84,90)
        const urlParams = new URLSearchParams(window.location.search);
        const valorUrl = urlParams.get('valor');
        if (valorUrl) document.getElementById('valor-pago').innerText = "R$ " + valorUrl;

        // Timer
        let time = 599;
        setInterval(() => {
            let min = Math.floor(time / 60); let sec = time % 60;
            document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(time > 0) time--;
        }, 1000);

        function nextStep() {
            const email = document.getElementById('customer-email').value;
            if(!email.includes('@')) return alert("Insira um e-mail válido!");
            document.getElementById('data-step').style.display = 'none';
            document.getElementById('payment-step').style.display = 'block';
            document.getElementById('step2-label').classList.add('active');
        }

        async function gerarPagamento() {
            const btn = document.getElementById('btn-finalizar');
            const email = document.getElementById('customer-email').value;
            const valor = document.getElementById('valor-pago').innerText;

            btn.disabled = true;
            btn.innerText = "GERANDO QR CODE...";

            try {
                const response = await fetch(URL_SUPABASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, amount: valor })
