<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout GAMEFLIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS DO CHECKOUT (ESTILO CAKTO) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .checkout-container {
            background: #141414;
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            color: white;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Barra de Progresso Superior */
        .step-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #1a1a1a;
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .step { color: #555; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .step.active { color: #fff; font-weight: bold; }
        .step span { 
            background: #333; width: 24px; height: 24px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; font-size: 0.75rem; 
        }
        .step.active span { background: #e50914; }
        .step-line { width: 40px; height: 1px; background: #333; }

        /* Estrutura Flexível */
        .checkout-flex {
            display: flex;
            flex-wrap: wrap;
        }

        /* Lado Esquerdo: Info do Produto */
        .product-sidebar {
            flex: 1;
            min-width: 320px;
            padding: 40px;
            background: #111;
            border-right: 1px solid #222;
        }

        .logo-gameflix {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
        }
        .red { color: #e50914; }

        .product-box {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid #222;
        }
        .product-img {
            width: 80px;
            height: 110px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
        }
        .product-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .product-info p { margin: 0; color: #888; font-size: 0.9rem; }
        .badge {
            display: inline-block;
            margin-top: 10px;
            color: #46d369;
            background: rgba(70, 211, 105, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .price-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-total span { color: #888; }
        .price-total h2 { margin: 0; font-size: 1.8rem; color: #fff; }

        /* Lado Direito: Formulário */
        .form-content {
            flex: 1.2;
            min-width: 320px;
            padding: 40px;
            background: #141414;
        }

        .form-header h3 { margin: 0 0 10px 0; font-size: 1.4rem; }
        .form-header p { margin: 0 0 30px 0; color: #666; font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            color: #bbb;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #e50914;
            outline: none;
            background: #222;
        }

        .btn-finish {
            width: 100%;
            padding: 18px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-finish:hover { background: #f40a16; transform: translateY(-2px); }

        .secure-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            color: #444;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .checkout-container { border-radius: 0; min-height: 100vh; border: none; }
            .product-sidebar { order: 2; padding: 30px; }
            .form-content { order: 1; padding: 30px; }
            .step-bar { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="step-bar">
            <div class="step active"><span>1</span> Dados</div>
            <div class="step-line"></div>
            <div class="step"><span>2</span> Pagamento</div>
        </div>

        <div class="checkout-flex">
            <div class="product-sidebar">
                <span class="logo-gameflix">GAME<span class="red">FLIX</span></span>
                
                <div class="product-box">
                    <img src="https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/aajbs93YvS7P6LrUisPCid9p.png" alt="Produto" class="product-img">
                    <div class="product-info">
                        <h3>Elden Ring: Shadow of the Erdtree</h3>
                        <p>Plano Premium Digital</p>
                        <span class="badge">ENTREGA IMEDIATA</span>
                    </div>
                </div>

                <div class="price-total">
                    <span>Total a pagar:</span>
                    <h2>R$ 29,90</h2>
                </div>
            </div>

            <div class="form-content">
                <div class="form-header">
                    <h3>Prepara o teu acesso</h3>
                    <p>Precisamos destes dados para enviar o teu jogo.</p>
                </div>

                <div class="input-group">
                    <label>NOME COMPLETO</label>
                    <input type="text" placeholder="Como te chamas?">
                </div>

                <div class="input-group">
                    <label>E-MAIL PARA RECEBER O JOGO</label>
                    <input type="email" placeholder="exemplo@email.com">
                </div>

                <div class="input-group">
                    <label>WHATSAPP (OPCIONAL)</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>

                <button class="btn-finish">CONTINUAR PARA PAGAMENTO</button>

                <div class="secure-info">
                    <span>🔒 AMBIENTE SEGURO</span>
                    <span>⭐ COMPRA GARANTIDA</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
