<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GAMEFLIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --netflix-red: #e50914;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --input-bg: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Roboto', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0202 0%, #050505 100%);
        }

        .urgency-timer {
            background: var(--netflix-red);
            width: 100%;
            text-align: center;
            padding: 8px 0;
            font-family: 'Bebas Neue';
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(229, 9, 20, 0.4);
        }

        .checkout-container {
            background: var(--card-bg);
            width: 95%;
            max-width: 900px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.5s ease-out;
            margin-top: 50px;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #1a1a1a;
            gap: 15px;
            border-bottom: 1px solid #222;
        }
        .step { color: #555; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-family: 'Bebas Neue'; letter-spacing: 1px; }
        .step.active { color: #fff; }
        .step span { background: #333; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.75rem; font-family: 'Roboto'; }
        .step.active span { background: var(--netflix-red); box-shadow: 0 0 10px var(--netflix-red); }
        .step-line { width: 40px; height: 1px; background: #333; }

        .checkout-flex { display: flex; flex-wrap: wrap; }

        .product-sidebar {
            flex: 1;
            min-width: 320px;
            padding: 40px;
            background: #111;
            border-right: 1px solid #222;
        }

        .logo-gameflix {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 30px;
            display: block;
        }
        .logo-gameflix span { color: var(--netflix-red); }

        .product-box {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid #222;
        }
        .product-img { width: 80px; height: 110px; border-radius: 6px; object-fit: cover; }
        .product-info h3 { margin: 0; font-size: 1.2rem; }
        .badge { display: inline-block; margin-top: 10px; color: #46d369; background: rgba(70, 211, 105, 0.1); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }

        .form-content { flex: 1.2; min-width: 320px; padding: 40px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #bbb; font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; }
        .input-group input {
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem;
        }

        .netflix-btn {
            display: block;
            width: 100%;
            padding: 20px 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(90deg, #e50914, #ff3b3b);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px #e50914;
            transition: 0.3s;
        }

        .netflix-btn:hover { transform: scale(1.03); }

        .purchase-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px 18px;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2000;
        }

        @media (max-width: 768px) {
            .checkout-flex { flex-direction: column-reverse; }
            .product-sidebar { border-right: none; border-bottom: 1px solid #222; }
            .checkout-container { margin-top: 40px; }
        }

        #payment-step { display: none; }
    </style>
</head>
<body>

    <div class="urgency-timer">
        OFERTA TERMINA EM: <span id="timer">09:59</span>
    </div>

    <div class="checkout-container">
        <div class="step-bar">
            <div class="step active" id="step1-label"><span>1</span> DADOS</div>
            <div class="step-line"></div>
            <div class="step" id="step2-label"><span>2</span> PAGAMENTO</div>
        </div>

        <div class="checkout-flex">
            <div class="product-sidebar">
                <span class="logo-gameflix">GAME<span>FLIX</span></span>
                
                <div class="product-box">
                    <img src="https://res.cloudinary.com/dlt1gqwnc/image/upload/v1772039414/pngtree-gamer-girl-streaming-online-isolated-on-transparent-background-png-image_16583366_pbl4v8.png" class="product-img">
                    <div class="product-info">
                        <h3>PACOTE GAMEFLIX</h3>
                        <p>Acesso Digital Premium</p>
                        <span class="badge">ENTREGA IMEDIATA</span>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#888;">Total:</span>
                    <h2 id="valor-pago" style="margin:0; font-family: 'Bebas Neue'; font-size: 2rem;">R$ 0,00</h2>
                </div>
            </div>

            <div class="form-content">
                <div id="data-step">
                    <h3 style="margin-top:0; font-family: 'Bebas Neue'; font-size: 1.8rem;">PREPARA O TEU ACESSO</h3>
                    <div class="input-group">
                        <label>NOME COMPLETO</label>
                        <input type="text" id="nome" placeholder="Teu nome completo">
                    </div>
                    <div class="input-group">
                        <label>E-MAIL DE ENTREGA</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                    <div class="input-group">
                        <label>WHATSAPP (OPCIONAL)</label>
                        <input type="tel" id="whatsapp" placeholder="(00) 00000-0000">
                    </div>
                    <button class="netflix-btn" onclick="nextStep()">PRÓXIMO PASSO</button>
                </div>

                <div id="payment-step">
                    <h3 style="margin-top:0; font-family: 'Bebas Neue'; font-size: 1.8rem;">ESCOLHA O PAGAMENTO</h3>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <button style="flex:1; padding:10px; background:#222; border:1px solid var(--netflix-red); color:#fff; border-radius:5px;">PIX</button>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:8px; text-align:center;">
                        <p style="font-size:0.9rem; color:#ccc;">O código PIX será gerado agora.</p>
                        <strong style="color:#46d369;">DESCONTO DE 5% APLICADO!</strong>
                    </div>
                    <button class="netflix-btn" style="margin-top:20px;" onclick="finalizarPagamento()">GERAR PIX AGORA</button>
                    <p onclick="backStep()" style="text-align:center; color:#666; font-size:0.8rem; margin-top:15px; cursor:pointer;">← Voltar para dados</p>
                </div>
            </div>
        </div>
    </div>

    <div class="purchase-toast" id="purchase-toast">
        <div style="background: var(--netflix-red); width: 10px; height: 10px; border-radius: 50%;"></div>
        <div style="font-size: 0.8rem;">
            <span id="buyer-name" style="font-weight: bold;">Lucas</span> acabou de comprar!
        </div>
    </div>

    <script>
        // 1. CAPTURA DO VALOR DA URL
        const urlParams = new URLSearchParams(window.location.search);
        const valorFinal = urlParams.get('valor') || "49,90"; 
        document.getElementById('valor-pago').innerText = `R$ ${valorFinal}`;

        // 2. LOGICA DO TIMER
        let time = 599;
        const timerElement = document.getElementById('timer');
        setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            timerElement.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            if(time > 0) time--;
        }, 1000);

        // 3. LOGICA DE PASSOS
        function nextStep() {
            if(!document.getElementById('email').value) { alert("Preencha seu e-mail para receber os jogos!"); return; }
            document.getElementById('data-step').style.display = 'none';
            document.getElementById('payment-step').style.display = 'block';
            document.getElementById('step2-label').classList.add('active');
        }

        function backStep() {
            document.getElementById('data-step').style.display = 'block';
            document.getElementById('payment-step').style.display = 'none';
            document.getElementById('step2-label').classList.remove('active');
        }

        // 4. FUNÇÃO PARA O MERCADO PAGO (BASE)
        function finalizarPagamento() {
            alert(`Gerando Pix no valor de R$ ${valorFinal}...`);
            // Aqui entra a sua integração oficial do Mercado Pago
        }

        // 5. PROVA SOCIAL
        const names = ["Felipe", "Marcos", "Ana", "Rodrigo", "Jéssica", "Ian", "Gustavo"];
        setInterval(() => {
            const toast = document.getElementById('purchase-toast');
            document.getElementById('buyer-name').innerText = names[Math.floor(Math.random() * names.length)];
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }, 12000);
    </script>
</body>
</html>
