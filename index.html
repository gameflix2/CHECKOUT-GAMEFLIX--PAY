<div id="checkoutGamer" class="checkout-overlay">
    <div class="cakto-style-container">
        <div class="step-bar">
            <div class="step active"><span>1</span> Dados</div>
            <div class="step-line"></div>
            <div class="step"><span>2</span> Pagamento</div>
        </div>

        <div class="checkout-flex">
            <div class="checkout-side-info">
                <div class="brand-header">
                    <span class="logo-text">GAME<span class="red-text">FLIX</span></span>
                </div>
                <div class="product-box">
                    <img id="checkout-img" src="" alt="Capa">
                    <div class="product-txt">
                        <h3 id="checkout-title">Nome do Jogo</h3>
                        <p>Plano Premium - Acesso Vitalício</p>
                        <span class="badge-instant">Entrega Instantânea</span>
                    </div>
                </div>
                <div class="total-box">
                    <span>Total a pagar:</span>
                    <span class="final-price">R$ 29,90</span>
                </div>
            </div>

            <div class="checkout-form-side">
                <button class="close-checkout" onclick="toggleCheckout()">&times;</button>
                <h3>Informações Pessoais</h3>
                <p class="subtitle">Preencha os dados abaixo para receber seu acesso.</p>
                
                <div class="input-group-cakto">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Digite seu nome...">
                </div>
                <div class="input-group-cakto">
                    <label>E-mail</label>
                    <input type="email" placeholder="exemplo@email.com">
                </div>
                <div class="input-group-cakto">
                    <label>WhatsApp (Opcional)</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>

                <button class="next-step-btn">CONTINUAR PARA PAGAMENTO</button>
                
                <div class="secure-footer">
                    <span>🔒 Ambiente Seguro</span>
                    <span>⭐ Compra Garantida</span>
                </div>
            </div>
        </div>
    </div>
</div>
