<div id="checkoutGamer" class="checkout-overlay">
    <div class="checkout-card">
        <div class="checkout-header">
            <span class="brand-name">O ARSENAL <span class="red-text">DE GAMES</span></span>
            <button class="close-btn" onclick="toggleCheckout()">&times;</button>
        </div>

        <div class="checkout-body">
            <div class="product-preview">
                <img id="checkout-img" src="" alt="Produto">
                <div class="product-details">
                    <h3 id="checkout-title">Nome do Jogo</h3>
                    <p class="status-online">● Entrega Instantânea</p>
                </div>
            </div>

            <div class="input-group">
                <label>QUEM VAI RECEBER?</label>
                <input type="text" placeholder="Seu nome completo">
                <input type="email" placeholder="Seu melhor e-mail">
            </div>

            <div class="price-section">
                <span>Total:</span>
                <span class="price-val">R$ 29,90</span>
            </div>

            <button class="buy-now-btn">FINALIZAR AGORA</button>
        </div>
        
        <div class="checkout-footer">
            <p>🛡️ Compra 100% Segura e Criptografada</p>
        </div>
    </div>
</div>
